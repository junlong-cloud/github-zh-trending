name: Daily refresh & deploy

on:
  schedule:
    # 01:05 UTC ≈ 09:05 Asia/Shanghai
    # 错开整点(0分)避免 GitHub Actions 高负载时段导致定时任务被延迟/丢弹
    - cron: '5 1 * * *'
  workflow_dispatch:  # 允许在 GitHub Actions 页面手动触发一次

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 需要把新的 data.json 写回仓库,留作下次对比涨跌的基准
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch trending data
        env:
          GITHUB_TOKEN: ${{ secrets.GH_READ_TOKEN }}
        run: python fetch_data.py

      - name: Commit updated data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "data: 自动刷新榜单 (run ${{ github.run_number }})"
          git push

      - name: Prepare dist directory
        run: |
          rm -rf dist
          mkdir -p dist
          cp index.html dist/
          cp data.json dist/

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: ./dist
          production-deploy: true
          deploy-message: "Scheduled daily refresh ${{ github.run_number }}"
          enable-pull-request-comment: false
          enable-commit-comment: false
          overwrites-pull-request-comment: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 5
